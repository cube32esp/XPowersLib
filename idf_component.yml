## IDF Component Manager Manifest File
version: "0.3.3"
description: "X-Powers AXP192, AXP202, AXP2101 and TI BQ25896 power management IC library for ESP-IDF. Forked from lewisxhe/XPowersLib and published as an ESP Component for easy integration via idf_component.yml."
url: "https://github.com/cube32esp/XPowersLib"
license: "MIT"

dependencies:
  idf:
    version: ">=4.4.0"

files:
  exclude:
    - "examples/**"
    - "datasheet/**"
    - "Micropython/**"
    - "tools/**"
    - ".github/**"
    - ".pio/**"
    - ".vscode/**"
